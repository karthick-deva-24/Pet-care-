<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard | Woofly</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body">
    <!-- Preloader -->
    <div class="preloader">
        <div class="paws-container">
            <i class="fa-solid fa-paw paw-1"></i>
            <i class="fa-solid fa-paw paw-2"></i>
            <i class="fa-solid fa-paw paw-3"></i>
            <i class="fa-solid fa-paw paw-4"></i>
            <i class="fa-solid fa-paw paw-5"></i>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="index.html" class="logo">
            <img src="images/stackly_logo_orange.png" alt="Stackly Logo" style="height: 40px; width: auto; object-fit: contain;">
        </a>
        
        <ul class="nav-menu">
            <li><a href="customer-dashboard.html" ><i class="fa-solid fa-house"></i> Home</a></li>
            <li><a href="customer-appointments.html"><i class="fa-solid fa-calendar-check"></i> My Appointments</a></li>
            <li><a href="customer-pets.html"><i class="fa-solid fa-paw"></i> My Pets</a></li>
            <li><a href="customer-records.html"><i class="fa-solid fa-file-medical"></i> Medical Records</a></li>
            <li><a href="customer-notifications.html"><i class="fa-solid fa-bell"></i> Notifications</a></li>
            <li><a class="active" href="customer-settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
        </ul>
        
        <a href="login.html" class="logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
                <header class="top-header">
            <div class="dashboard-hamburger" id="dash-hamburger">
                <i class="fa-solid fa-bars"></i>
            </div>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass" style="color: var(--text-gray);"></i>
                <input type="text" placeholder="Search services, records...">
            </div>
            
            <div class="user-profile">
                <div class="user-info" style="text-align: right;">
                    <h4 id="profile-name">Sarah Johnson</h4>
                    <p>Customer</p>
                </div>
                <img id="profile-img" src="https://ui-avatars.com/api/?name=Sarah+Johnson&background=ffb800&color=fff" alt="Customer Profile">
            </div>
        </header>

        <!-- Dashboard Content -->
        <div class="dashboard-content">
            <div class="content-section">
                <div class="section-header">
                    <h2>Account Settings</h2>
                </div>
                <div class="grid-2">
                    <div style="background:white; border-radius:10px; padding:30px; box-shadow:0 4px 15px rgba(0,0,0,0.05);">
                        <h3>Personal Information</h3>
                        <div class="input-group" style="margin-top:20px; margin-bottom:20px; text-align:left;">
                            <label style="display:block; font-weight:600; margin-bottom:5px;">Full Name</label>
                            <input type="text" value="Sarah Johnson" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px; box-sizing:border-box;">
                        </div>
                        <div class="input-group" style="margin-bottom:20px; text-align:left;">
                            <label style="display:block; font-weight:600; margin-bottom:5px;">Email Address</label>
                            <input type="email" value="sarah@example.com" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px; box-sizing:border-box;">
                        </div>
                        <div class="input-group" style="margin-bottom:20px; text-align:left;">
                            <label style="display:block; font-weight:600; margin-bottom:5px;">Phone Number</label>
                            <input type="tel" value="+1 234 567 8900" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px; box-sizing:border-box;">
                        </div>
                        <button onclick="window.location.href='404.html'" class="btn-primary" style="width:100%;">Save Changes</button>
                    </div>
                    
                    <div style="background:white; border-radius:10px; padding:30px; box-shadow:0 4px 15px rgba(0,0,0,0.05); text-align:left;">
                        <h3>Notification Preferences</h3>
                        <div style="margin-top:20px; display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                            <input type="checkbox" id="email-notif" checked>
                            <label for="email-notif">Email Notifications</label>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                            <input type="checkbox" id="sms-notif" checked>
                            <label for="sms-notif">SMS Alerts</label>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:30px;">
                            <input type="checkbox" id="marketing-notif">
                            <label for="marketing-notif">Marketing Emails</label>
                        </div>
                        
                        <h3 style="margin-top:20px; padding-top:20px; border-top:1px solid #eee; color:#dc3545;">Danger Zone</h3>
                        <p style="color:var(--text-gray); margin:10px 0;">Once you delete your account, there is no going back.</p>
                        <button onclick="window.location.href='404.html'" class="btn-primary" style="background:#dc3545; width:100%;">Delete Account</button>
                    </div>
                </div>
            </div>
</div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loggedInName = localStorage.getItem('loggedInName');
            if (loggedInName) {
                document.getElementById('profile-name').textContent = loggedInName;
                document.getElementById('profile-img').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(loggedInName)}&background=ffb800&color=fff`;
                
                const firstName = loggedInName.split(' ')[0];
                document.getElementById('welcome-message').textContent = `Welcome back, ${firstName}!`;
            }
        });
    </script>
    <!-- Preloader Script -->
    <script>
        window.addEventListener('load', function() {
            var preloader = document.querySelector('.preloader');
            if (preloader) {
                preloader.classList.add('hidden');
                setTimeout(function() {
                    preloader.style.display = 'none';
                }, 500);
            }
        });
    </script>
<script>
    // Public pages hamburger
    const hamburger = document.getElementById('hamburger-menu');
    const navLinks = document.querySelector('.nav-links');
    if (hamburger && navLinks) {
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    }

    // Dashboard hamburger
    const dashHamburger = document.getElementById('dash-hamburger');
    const sidebar = document.querySelector('.sidebar');
    if (dashHamburger && sidebar) {
        dashHamburger.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });
    }
</script>
</body>
</html>
